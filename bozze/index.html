<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestionale salone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Victor+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/salone.css">
</head>
<body class="auth-page" data-theme="chiaro">
    <button type="button" class="theme-float" data-theme-toggle><span class="theme-toggle-text">tema scuro</span></button>
<script>
(function () {
    var storageKey = 'saloneTheme';
    var body = document.body;
    if (!body) return;

    var current = body.getAttribute('data-theme') === 'scuro' ? 'scuro' : 'chiaro';
    try {
        var saved = localStorage.getItem(storageKey);
        if (saved === 'chiaro' || saved === 'scuro') {
            current = saved;
            body.setAttribute('data-theme', current);
        }
    } catch (e) {}

    function syncLabel() {
        var next = body.getAttribute('data-theme') === 'scuro' ? 'chiaro' : 'scuro';
        document.querySelectorAll('.theme-toggle-text').forEach(function (node) {
            node.textContent = 'tema ' + next;
        });
    }

    syncLabel();

    document.querySelectorAll('[data-theme-toggle]').forEach(function (button) {
        button.addEventListener('click', function () {
            var next = body.getAttribute('data-theme') === 'scuro' ? 'chiaro' : 'scuro';
            body.setAttribute('data-theme', next);
            try {
                localStorage.setItem(storageKey, next);
            } catch (e) {}
            syncLabel();
        });
    });
})();
</script>
    <div class="wrap">
        <div class="card">
            <div class="eyebrow">gestionale salone</div>
            <h1>Interfaccia minimale.</h1>
            <p class="sub">Palette crema, viola e nero. Accesso rapido, struttura pulita e focus sulle funzioni davvero utili.</p>
            <div class="actions">
                <a class="primary" href="login.php">accedi</a>
                <a class="ghost" href="registrazione.php">crea salone</a>
            </div>
        </div>
    </div>
</body>
</html>
